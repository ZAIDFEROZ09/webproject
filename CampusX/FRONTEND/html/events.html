<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>CampusX Events</title>

    <link rel="stylesheet"
        href="../css/events.css">
    <link rel="stylesheet"
        href="../css/animation.css">
    <link rel="stylesheet"
        href="../css/responsive.css">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="logo">
            CampusX
        </div>

        <ul class="sidebar-links">

            <li>
                <a href="dashboard.html">
                    <i class="fa-solid fa-table-columns"></i>
                    Dashboard
                </a>
            </li>

            <li>
                <a href="notes.html">
                    <i class="fa-solid fa-book"></i>
                    Notes
                </a>
            </li>

            <li class="active">
                <a href="events.html">
                    <i class="fa-solid fa-calendar"></i>
                    Events
                </a>
            </li>

            <li>
                <a href="complaints.html">
                    <i class="fa-solid fa-circle-exclamation"></i>
                    Complaints
                </a>
            </li>

            <li>
                <a href="profile.html">
                    <i class="fa-solid fa-user"></i>
                    Profile
                </a>
            </li>

        </ul>

    </aside>



    <!-- Main Content -->

    <main class="main-content">

        <!-- Navbar -->

        <header class="top-navbar">

            <div class="search-box">

                <i class="fa-solid fa-magnifying-glass"></i>

                <input type="text"
                    id="searchEvent"
                    placeholder="Search Events...">

            </div>

        </header>



        <!-- Header -->

        <section class="events-header">

            <h1>Campus Events</h1>

            <p>
                Manage and explore university events.
            </p>

        </section>



        <!-- Event Form -->

        <section class="event-form-section">

            <h2>Create Event</h2>

            <div class="event-form">

                <input type="text"
                    id="eventTitle"
                    placeholder="Event Title">

                <input type="date"
                    id="eventDate">

                <input type="text"
                    id="eventOrganizer"
                    placeholder="Organizer">

                <select id="eventCategory">

                    <option value="Workshop">
                        Workshop
                    </option>

                    <option value="Seminar">
                        Seminar
                    </option>

                    <option value="Competition">
                        Competition
                    </option>

                </select>

                <button id="addEventBtn">

                    <i class="fa-solid fa-plus"></i>

                    Add Event

                </button>

            </div>

        </section>



        <!-- Events Grid -->

        <section class="events-grid"
            id="eventsContainer">

        </section>

    </main>



    <script src="../js/events.js"></script>

</body>

</html>
