<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>CampusX Notifications</title>

    <link rel="stylesheet"
        href="../css/notifications.css">
        <link rel="stylesheet"
        href="../css/animation.css">
                 <link rel="stylesheet"
        href="../css/responsive.css">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="logo">
            CampusX
        </div>

        <ul class="sidebar-links">

            <li>
                <a href="dashboard.html">
                    <i class="fa-solid fa-table-columns"></i>
                    Dashboard
                </a>
            </li>

            <li>
                <a href="notes.html">
                    <i class="fa-solid fa-book"></i>
                    Notes
                </a>
            </li>

            <li>
                <a href="events.html">
                    <i class="fa-solid fa-calendar"></i>
                    Events
                </a>
            </li>

            <li>
                <a href="complaints.html">
                    <i class="fa-solid fa-circle-exclamation"></i>
                    Complaints
                </a>
            </li>

            <li class="active">
                <a href="notifications.html">
                    <i class="fa-solid fa-bell"></i>
                    Notifications
                </a>
            </li>

        </ul>

    </aside>



    <!-- Main Content -->

    <main class="main-content">

        <section class="notification-header">

            <h1>
                Notifications
            </h1>

            <p>
                Stay updated with recent campus activity.
            </p>

        </section>



        <!-- Notification Count -->

        <div class="notification-count">

            <i class="fa-solid fa-bell"></i>

            <span id="totalNotifications">
                0
            </span>

        </div>



        <!-- Notifications Container -->

        <section class="notifications-container"
            id="notificationsContainer">

        </section>

    </main>



    <script src="../js/notifications.js"></script>

</body>

</html>
